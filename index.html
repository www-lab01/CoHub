<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CollegeHub - Your College Social Network</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-graduation-cap"></i>
                <span>CollegeHub</span>
            </div>
            <div class="nav-search">
                <input type="text" id="searchInput" placeholder="Search posts, people...">
                <i class="fas fa-search"></i>
            </div>
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="feed"><i class="fas fa-home"></i> Feed</button>
                <button class="nav-tab" data-tab="notes"><i class="fas fa-book"></i> Notes</button>
                <button class="nav-tab" data-tab="youtube"><i class="fab fa-youtube"></i> Videos</button>
                <button class="nav-tab" data-tab="chat"><i class="fab fa-whatsapp"></i> Chat</button>
                <button class="nav-tab" data-tab="updates"><i class="fas fa-bullhorn"></i> Updates</button>
                <button class="nav-tab" data-tab="complaints"><i class="fas fa-exclamation-triangle"></i> Complaints</button>
            </div>
            <div class="nav-user">
                <img src="https://via.placeholder.com/40" alt="Profile" id="userAvatar" class="avatar">
                <span id="userName">Student</span>
                <div class="dropdown">
                    <button class="dropdown-btn"><i class="fas fa-chevron-down"></i></button>
                    <div class="dropdown-content">
                        <a href="#" id="profileBtn"><i class="fas fa-user"></i> Profile</a>
                        <a href="#" id="settingsBtn"><i class="fas fa-cog"></i> Settings</a>
                        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Feed Tab -->
        <div id="feed" class="tab-content active">
            <div class="create-post">
                <textarea id="postContent" placeholder="What's happening in college today? 📚✨"></textarea>
                <div class="post-actions">
                    <input type="file" id="postImage" accept="image/*" style="display:none">
                    <button onclick="document.getElementById('postImage').click()">
                        <i class="fas fa-image"></i> Photo
                    </button>
                    <button onclick="createPost()">Post</button>
                </div>
            </div>
            <div id="postsContainer" class="posts-container"></div>
        </div>

        <!-- Notes Tab -->
        <div id="notes" class="tab-content">
            <div class="notes-header">
                <h2>📚 Study Notes</h2>
                <button class="btn-primary" onclick="showNoteModal()">+ New Note</button>
            </div>
            <div id="notesContainer" class="notes-grid"></div>
        </div>

        <!-- YouTube Tab -->
        <div id="youtube" class="tab-content">
            <div class="video-header">
                <h2>🎥 College Videos</h2>
                <button class="btn-primary" onclick="showVideoModal()">+ Upload Video</button>
            </div>
            <div id="videosContainer" class="videos-grid"></div>
        </div>

        <!-- Chat Tab -->
        <div id="chat" class="tab-content">
            <div class="chat-header">
                <h2>💬 College Chat</h2>
                <select id="chatRooms">
                    <option value="general">General Chat</option>
                    <option value="cs">Computer Science</option>
                    <option value="mech">Mechanical</option>
                    <option value="ece">ECE</option>
                </select>
            </div>
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Type a message...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

        <!-- Updates Tab -->
        <div id="updates" class="tab-content">
            <div class="updates-header">
                <h2>📢 Official Updates</h2>
            </div>
            <div id="updatesContainer"></div>
        </div>

        <!-- Complaints Tab -->
        <div id="complaints" class="tab-content">
            <div class="complaints-header">
                <h2>⚠️ Complaints & Feedback</h2>
                <button class="btn-warning" onclick="showComplaintModal()">+ New Complaint</button>
            </div>
            <div id="complaintsContainer"></div>
        </div>
    </main>

    <!-- Modals -->
    <div id="noteModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>New Study Note</h3>
            <input type="text" id="noteTitle" placeholder="Note Title">
            <textarea id="noteContent" placeholder="Note content..."></textarea>
            <select id="noteSubject">
                <option value="cs">Computer Science</option>
                <option value="math">Mathematics</option>
                <option value="physics">Physics</option>
            </select>
            <button onclick="saveNote()">Save Note</button>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal active">
        <div class="modal-content login-modal">
            <h2>Welcome to CollegeHub</h2>
            <input type="text" id="loginStudentId" placeholder="Student ID">
            <input type="password" id="loginPassword" placeholder="Password">
            <button onclick="login()">Login</button>
            <p>Demo: ID: STUDENT001, Pass: 123456</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
